name: enterprise-base-linux-azure-destroy

on:
  workflow_dispatch:

env:
  TF_VAR_azure_region: ${{ vars.AZURE_DEFAULT_REGION }}
  TF_VAR_admin_username: ${{ secrets.ENTERPRISE_ADMIN_USERNAME }}
  TF_VAR_admin_password: ${{ secrets.ENTERPRISE_ADMIN_PASSWORD }}
  TF_VAR_admin_email: ${{ secrets.ENTERPRISE_ADMIN_EMAIL }}
  TF_VAR_vm_admin_username: ${{ secrets.VM_ADMIN_USERNAME }}
  TF_VAR_vm_admin_password: ${{ secrets.VM_ADMIN_PASSWORD }}
  ARCGIS_ONLINE_USERNAME: ${{ secrets.ARCGIS_ONLINE_USERNAME }}
  ARCGIS_ONLINE_PASSWORD: ${{ secrets.ARCGIS_ONLINE_PASSWORD }}
  ARM_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
  ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
  ARM_USE_AZUREAD: true
  ARM_STORAGE_USE_AZUREAD: true
  TERRAFORM_BACKEND_STORAGE_ACCOUNT_NAME: ${{ vars.TERRAFORM_BACKEND_STORAGE_ACCOUNT_NAME }}
  TERRAFORM_BACKEND_CONTAINER_NAME: ${{ vars.TERRAFORM_BACKEND_CONTAINER_NAME }}
  PYTHONPATH: ${{ github.workspace }}/azure/scripts
  APPLICATION_CONFIG_FILE: ${{ github.workspace }}/config/azure/arcgis-enterprise-base-linux/application.tfvars.json
  INFRASTRUCTURE_CONFIG_FILE: ${{ github.workspace }}/config/azure/arcgis-enterprise-base-linux/infrastructure.tfvars.json
  IMAGE_CONFIG_FILE: ${{ github.workspace }}/config/azure/arcgis-enterprise-base-linux/image.vars.json

concurrency:
  group: ${{ github.ref_name }}

jobs:
  destroy:
    name: Destroy Deployment
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Link config directory
        id: symlink
        run: ln -s ${{ github.workspace }}/config ~/config
      - name: Azure SDK for Python
        id: install-azure-sdk
        run: pip install azure-identity azure-keyvault-secrets azure-mgmt-compute azure-mgmt-keyvault azure-storage-blob
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.10.0"
      - name: Destroy Application
        id: application-destroy
        working-directory: azure/arcgis-enterprise-base-linux/application
        run: |
          SITE_ID=$(jq -r '.site_id' $APPLICATION_CONFIG_FILE)
          DEPLOYMENT_ID=$(jq -r '.deployment_id' $APPLICATION_CONFIG_FILE)
          terraform init -backend-config="storage_account_name=$TERRAFORM_BACKEND_STORAGE_ACCOUNT_NAME" \
                         -backend-config="container_name=$TERRAFORM_BACKEND_CONTAINER_NAME" \
                         -backend-config="key=$SITE_ID/azure/$DEPLOYMENT_ID/application.tfstate"
          terraform destroy -var-file $APPLICATION_CONFIG_FILE -auto-approve -input=false
      - name: Destroy Infrastructure
        id: infrastructure-destroy
        working-directory: azure/arcgis-enterprise-base-linux/infrastructure
        run: |
          SITE_ID=$(jq -r '.site_id' $INFRASTRUCTURE_CONFIG_FILE)
          DEPLOYMENT_ID=$(jq -r '.deployment_id' $INFRASTRUCTURE_CONFIG_FILE)
          terraform init -backend-config="storage_account_name=$TERRAFORM_BACKEND_STORAGE_ACCOUNT_NAME" \
                         -backend-config="container_name=$TERRAFORM_BACKEND_CONTAINER_NAME" \
                         -backend-config="key=$SITE_ID/azure/$DEPLOYMENT_ID/infrastructure.tfstate"
          terraform destroy -var-file $INFRASTRUCTURE_CONFIG_FILE -auto-approve -input=false
      - name: Delete VM Image Definition
        run: |
          az login --service-principal -u $ARM_CLIENT_ID -p $ARM_CLIENT_SECRET --tenant $ARM_TENANT_ID --output none
          az account set --subscription $ARM_SUBSCRIPTION_ID
          SITE_ID=$(jq -r '.site_id' $IMAGE_CONFIG_FILE)
          DEPLOYMENT_ID=$(jq -r '.deployment_id' $IMAGE_CONFIG_FILE)
          ARCGIS_VERSION=$(jq -r '.arcgis_version' $IMAGE_CONFIG_FILE)
          OS=$(jq -r '.os' $IMAGE_CONFIG_FILE)
          VAULT_NAME=$(az keyvault list --query "[?tags.ArcGISSiteId=='$SITE_ID' && tags.ArcGISRole=='site-vault'].name" -o tsv)
          IMAGE_GALLERY_NAME=$(az keyvault secret show --name "image-gallery-name" --vault-name "$VAULT_NAME" --query "value" -o tsv)
          DEFINITION_NAME="$DEPLOYMENT_ID-$ARCGIS_VERSION-$OS"
          RESOURCE_GROUP="$SITE_ID-infrastructure-core"
          echo "Checking for existing versions in $DEFINITION_NAME..."
          VERSIONS=$(az sig image-version list \
            --resource-group "$RESOURCE_GROUP" \
            --gallery-name "$IMAGE_GALLERY_NAME" \
            --gallery-image-definition "$DEFINITION_NAME" \
            --query "[].name" -o tsv)
          for VERSION in $VERSIONS; do
            echo "Deleting image version: $VERSION"
            az sig image-version delete \
              --resource-group "$RESOURCE_GROUP" \
              --gallery-name "$IMAGE_GALLERY_NAME" \
              --gallery-image-definition "$DEFINITION_NAME" \
              --gallery-image-version "$VERSION"
          done
          echo "Deleting image definition: $DEFINITION_NAME"
          az sig image-definition delete \
            --resource-group "$RESOURCE_GROUP" \
            --gallery-name "$IMAGE_GALLERY_NAME" \
            --gallery-image-definition "$DEFINITION_NAME"
