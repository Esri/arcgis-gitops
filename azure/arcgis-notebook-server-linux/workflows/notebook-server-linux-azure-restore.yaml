name: notebook-server-linux-azure-restore

on: 
  workflow_dispatch:

env:
  ARM_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
  ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
  ARM_USE_AZUREAD: true
  AZURE_DEFAULT_REGION: ${{ vars.AZURE_DEFAULT_REGION }}
  ADMIN_USERNAME: ${{ secrets.ENTERPRISE_ADMIN_USERNAME }}
  ADMIN_PASSWORD: ${{ secrets.ENTERPRISE_ADMIN_PASSWORD }}  
  PYTHONPATH: ${{ github.workspace }}/azure/scripts
  CONFIG_FILE: ${{ github.workspace }}/config/azure/arcgis-notebook-server-linux/restore.vars.json

concurrency:
  group: ${{ github.ref_name }}

jobs:
  restore:
    name: Restore from Backup
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: azure/arcgis-notebook-server-linux/restore
    permissions:
      contents: read
      pull-requests: write
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Azure SDK for Python
      id: install-azure-sdk
      run: pip install azure-identity azure-keyvault-secrets azure-mgmt-compute azure-storage-blob
    - name: Import Site
      id: import-site
      run: |
        ENTERPRISE_ID=$(jq -r '.enterprise_id' $CONFIG_FILE)
        BACKUP_ENTERPRISE_ID=$(jq -r '.backup_enterprise_id' $CONFIG_FILE)
        DEPLOYMENT_ID=$(jq -r '.deployment_id' $CONFIG_FILE)
        az login --service-principal -u $ARM_CLIENT_ID -p $ARM_CLIENT_SECRET --tenant $ARM_TENANT_ID
        az account set --subscription $ARM_SUBSCRIPTION_ID
        BACKUP_KV_NAME=$(az keyvault list --query "[?tags.ArcGISEnterpriseID=='$BACKUP_ENTERPRISE_ID' && tags.ArcGISRole=='enterprise-vault'].name" -o tsv)
        STORAGE_ACCOUNT_NAME=$(az keyvault secret show --vault-name $BACKUP_KV_NAME --name "storage-account-name" --query "value" -o tsv)
        KV_NAME=$(az keyvault list --query "[?tags.ArcGISEnterpriseID=='$ENTERPRISE_ID' && tags.ArcGISRole=='enterprise-vault'].name" -o tsv)
        VM_IDENTITY_CLIENT_ID=$(az keyvault secret show --vault-name $KV_NAME --name "vm-identity-client-id" --query "value" -o tsv)
        export JSON_PARAMETERS=$(cat $CONFIG_FILE | jq ".admin_username += \"$ADMIN_USERNAME\"" | jq ".admin_password += \"$ADMIN_PASSWORD\"" | jq ".storage_account_name += \"$STORAGE_ACCOUNT_NAME\"" | jq ".vm_identity_client_id += \"$VM_IDENTITY_CLIENT_ID\"" | base64)
        python -m az_run_shell_script -s $ENTERPRISE_ID -d $DEPLOYMENT_ID -m primary -f importSite.sh -v $KV_NAME -e 600
